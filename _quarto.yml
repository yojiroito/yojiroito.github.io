project:
  type: website
  output-dir: _site
  # data/research.yml から Markdown 断片を生成してからレンダリングする
  pre-render: scripts/build_lists.py
  resources:
    - "header.png"

website:
  title: "Yojiro Ito"
  site-url: "https://yojiroito.github.io/"
  description: "Yojiro Ito — economist at the Bank of Japan, Ph.D. student at Waseda University."
  search: false
  page-navigation: false
  back-to-top-navigation: false

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    anchor-sections: false
    page-layout: full
    link-external-newwindow: true
    link-external-icon: false
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
