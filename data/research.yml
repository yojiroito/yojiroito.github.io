# =====================================================================
#  research.yml — 論文リストの唯一の管理元 (single source of truth)
#  ここを編集すると Web サイトと CV の両方が自動で更新されます。
# ---------------------------------------------------------------------
#  使えるフィールド（すべて任意。不要なものは行ごと省略可）
#    title         : 論文タイトル（必須）
#    coauthors     : 共著者のリスト。単著なら省略
#    url           : リンク先。DOI 推奨。無ければ省略（リンクなしで出力）
#    outlet        : 掲載誌名。斜体で出力される
#    series        : WP シリーズ名など。斜体にしない
#    details       : 巻号・ページ・論文番号など
#    year          : 発表年
#    note          : "Revise and Resubmit" などの補足
#    presentations : 学会報告のリスト
# ---------------------------------------------------------------------
#  注意: 全角コロン「：」ではなく半角コロン「:」を使ってください。
#        タイトルに「:」が含まれる場合は必ず " " で囲ってください。
# =====================================================================

